<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Score Four Zero Elo Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2 {
      margin: 0 0 12px;
    }

    .panel {
      background: #fff;
      border: 1px solid #d0d0d0;
      padding: 16px;
      margin-bottom: 16px;
    }

    .muted {
      color: #666;
    }

    .row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid #d0d0d0;
      padding: 12px;
      background: #fafafa;
    }

    .stat-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #fff;
      border: 1px solid #d0d0d0;
    }

    .chart-container {
      position: relative;
    }

    .chart-tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      padding: 6px 8px;
      font-size: 12px;
      color: #fff;
      background: rgba(34, 34, 34, 0.95);
      border-radius: 4px;
      white-space: nowrap;
      z-index: 1;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: #666;
      border: 1px solid #d0d0d0;
      background: #fafafa;
    }

    #chart-subtitle {
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="row">
        <div>
          <h1>Score Four Zero Elo Dashboard</h1>
          <div class="muted">Live view of the current Elo curve during training.</div>
        </div>
        <div id="status-text" class="muted">Waiting for snapshots...</div>
      </div>
    </section>

    <section class="panel">
      <div class="controls">
        <div class="row">
          <div id="selected-label">Selected snapshot: none</div>
          <div id="snapshot-count" class="muted">0 snapshots</div>
        </div>
        <input id="snapshot-slider" type="range" min="0" max="0" value="0" step="1" disabled>
        <label>
          <input id="follow-latest" type="checkbox" checked>
          Follow latest snapshot
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Training iteration</div>
          <div class="stat-value" id="iteration-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">Tracked checkpoints</div>
          <div class="stat-value" id="num-models-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">Latest model Elo</div>
          <div class="stat-value" id="latest-elo-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">Best model Elo</div>
          <div class="stat-value" id="best-elo-value">-</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Elo Curve</h2>
      <div id="chart-subtitle" class="muted">No data yet</div>
      <div id="snapshot-chart" class="empty">No Elo snapshots recorded yet.</div>
    </section>
  </main>

  <script>
    const snapshots = [];
    let selectedIndex = -1;

    const pollIntervalMs = 4000;
    const slider = document.getElementById("snapshot-slider");
    const followLatestCheckbox = document.getElementById("follow-latest");

    function formatNumber(value, digits = 1) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "-";
      }
      return Number(value).toFixed(digits);
    }

    function makeTicks(minValue, maxValue, tickCount = 5) {
      if (!Number.isFinite(minValue) || !Number.isFinite(maxValue)) {
        return [];
      }
      if (minValue === maxValue) {
        return [minValue];
      }

      const span = maxValue - minValue;
      const rawStep = span / Math.max(1, tickCount - 1);
      const magnitude = 10 ** Math.floor(Math.log10(rawStep));
      const normalized = rawStep / magnitude;

      let niceStep;
      if (normalized <= 1) {
        niceStep = 1;
      } else if (normalized <= 2) {
        niceStep = 2;
      } else if (normalized <= 5) {
        niceStep = 5;
      } else {
        niceStep = 10;
      }
      niceStep *= magnitude;

      const tickStart = Math.floor(minValue / niceStep) * niceStep;
      const tickEnd = Math.ceil(maxValue / niceStep) * niceStep;
      const ticks = [];
      const epsilon = niceStep * 1e-6;

      for (let value = tickStart; value <= tickEnd + niceStep * 0.5; value += niceStep) {
        const roundedValue = Number(value.toFixed(10));
        if (roundedValue >= minValue - epsilon && roundedValue <= maxValue + epsilon) {
          ticks.push(roundedValue);
        }
      }

      if (!ticks.length) {
        ticks.push(Number(((minValue + maxValue) / 2).toFixed(10)));
      }

      return ticks;
    }

    function renderLineChart(container, points, options) {
      if (!points.length) {
        container.className = "empty";
        container.textContent = options.emptyMessage || "No data";
        return;
      }

      container.className = "";
      const width = 900;
      const height = 400;
      const padding = { top: 24, right: 20, bottom: 58, left: 62 };
      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;

      const xValues = points.map((point) => point.x);
      const yValues = points.map((point) => point.y);
      const highestY = Math.max(...yValues);

      let minX = Math.min(...xValues);
      let maxX = Math.max(...xValues);
      let minY = Math.min(...yValues);
      let maxY = Math.max(...yValues);

      if (minX === maxX) {
        minX -= 1;
        maxX += 1;
      }
      if (minY === maxY) {
        minY -= 1;
        maxY += 1;
      }

      const yPadding = (maxY - minY) * 0.08;
      minY -= yPadding;
      maxY += yPadding;

      const xTicks = makeTicks(minX, maxX, 11);
      const yTicks = makeTicks(minY, maxY, 11);

      const xToSvg = (x) => padding.left + ((x - minX) / (maxX - minX)) * plotWidth;
      const yToSvg = (y) => padding.top + (1 - (y - minY) / (maxY - minY)) * plotHeight;

      const gridLines = [
        ...yTicks.map((tick) => {
          const y = yToSvg(tick);
          return `<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#dddddd" stroke-width="1" />`;
        }),
        ...xTicks.map((tick) => {
          const x = xToSvg(tick);
          return `<line x1="${x}" y1="${padding.top}" x2="${x}" y2="${height - padding.bottom}" stroke="#dddddd" stroke-width="1" />`;
        }),
      ].join("");

      const xLabels = xTicks.map((tick) => {
        const x = xToSvg(tick);
        return `<text x="${x}" y="${height - 24}" text-anchor="middle" fill="#666666" font-size="12">${Math.round(tick)}</text>`;
      }).join("");

      const yLabels = yTicks.map((tick) => {
        const y = yToSvg(tick);
        return `<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" fill="#666666" font-size="12">${Math.round(tick)}</text>`;
      }).join("");

      const path = points.map((point, index) => {
        const prefix = index === 0 ? "M" : "L";
        return `${prefix}${xToSvg(point.x).toFixed(2)} ${yToSvg(point.y).toFixed(2)}`;
      }).join(" ");

      const circles = points.map((point) => {
        const x = xToSvg(point.x);
        const y = yToSvg(point.y);
        const isHighestPoint = Math.abs(point.y - highestY) < 1e-9;
        const fill = isHighestPoint ? "#d62728" : "#1f77b4";
        const radius = isHighestPoint ? "4.5" : "3.5";
        return `<circle cx="${x}" cy="${y}" r="${radius}" fill="${fill}" data-x="${point.x}" data-y="${point.y}"></circle>`;
      }).join("");

      container.className = "chart-container";
      container.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${options.title}">
          ${gridLines}
          <line x1="${padding.left}" y1="${height - padding.bottom}" x2="${width - padding.right}" y2="${height - padding.bottom}" stroke="#222222" stroke-width="1.2" />
          <line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${height - padding.bottom}" stroke="#222222" stroke-width="1.2" />
          <path d="${path}" fill="none" stroke="#1f77b4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
          ${circles}
          ${xLabels}
          ${yLabels}
          <text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#666666" font-size="13">${options.xLabel}</text>
          <text x="18" y="${height / 2}" text-anchor="middle" fill="#666666" font-size="13" transform="rotate(-90 18 ${height / 2})">${options.yLabel}</text>
        </svg>
        <div class="chart-tooltip"></div>
      `;

      const tooltip = container.querySelector(".chart-tooltip");
      const svg = container.querySelector("svg");

      for (const circle of svg.querySelectorAll("circle[data-x]")) {
        circle.addEventListener("mouseenter", () => {
          const x = circle.dataset.x;
          const y = formatNumber(Number(circle.dataset.y));
          tooltip.textContent = `${options.pointLabel || "x"} ${x}, ${options.valueLabel || "y"} ${y}`;
          tooltip.style.display = "block";
        });

        circle.addEventListener("mousemove", (event) => {
          const rect = container.getBoundingClientRect();
          tooltip.style.left = `${event.clientX - rect.left + 10}px`;
          tooltip.style.top = `${event.clientY - rect.top - 28}px`;
        });

        circle.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
        });
      }
    }

    function updateStats(snapshot) {
      if (!snapshot) {
        document.getElementById("selected-label").textContent = "Selected snapshot: none";
        document.getElementById("snapshot-count").textContent = "0 snapshots";
        document.getElementById("iteration-value").textContent = "-";
        document.getElementById("num-models-value").textContent = "-";
        document.getElementById("latest-elo-value").textContent = "-";
        document.getElementById("best-elo-value").textContent = "-";
        document.getElementById("chart-subtitle").textContent = "No data yet";
        return;
      }

      document.getElementById("selected-label").textContent = `Selected snapshot: iteration ${snapshot.iteration}`;
      document.getElementById("snapshot-count").textContent = `${snapshots.length} snapshots`;
      document.getElementById("iteration-value").textContent = String(snapshot.iteration);
      document.getElementById("num-models-value").textContent = String(snapshot.num_models);
      document.getElementById("latest-elo-value").textContent =
        `${formatNumber(snapshot.latest_model_elo)} @ ${snapshot.latest_model_iteration ?? "-"}`;
      document.getElementById("best-elo-value").textContent =
        `${formatNumber(snapshot.best_elo)} @ ${snapshot.best_model_iteration ?? "-"}`;
      document.getElementById("chart-subtitle").textContent =
        `Checkpoint Elo values at training iteration ${snapshot.iteration}`;
    }

    function updateChart(snapshot) {
      const snapshotChart = document.getElementById("snapshot-chart");

      if (!snapshot) {
        snapshotChart.className = "empty";
        snapshotChart.textContent = "No Elo snapshots recorded yet.";
        return;
      }

      const snapshotPoints = snapshot.model_iterations.map((modelIteration, index) => ({
        x: modelIteration,
        y: snapshot.elos[index],
      }));

      renderLineChart(snapshotChart, snapshotPoints, {
        title: "Snapshot Elo curve",
        xLabel: "Checkpoint iteration",
        yLabel: "Elo",
        pointLabel: "checkpoint",
        valueLabel: "elo",
        emptyMessage: "No checkpoint Elo values yet.",
      });
    }

    function renderSelectedSnapshot() {
      const snapshot = selectedIndex >= 0 ? snapshots[selectedIndex] : null;
      updateStats(snapshot);
      updateChart(snapshot);

      if (snapshot) {
        document.getElementById("status-text").textContent =
          `Last recorded iteration: ${snapshots[snapshots.length - 1].iteration}`;
      } else {
        document.getElementById("status-text").textContent = "Waiting for snapshots...";
      }
    }

    function syncSlider() {
      if (!snapshots.length) {
        slider.disabled = true;
        slider.min = "0";
        slider.max = "0";
        slider.value = "0";
        selectedIndex = -1;
        renderSelectedSnapshot();
        return;
      }

      slider.disabled = false;
      slider.min = "0";
      slider.max = String(snapshots.length - 1);

      const shouldFollowLatest =
        followLatestCheckbox.checked ||
        selectedIndex < 0 ||
        selectedIndex >= snapshots.length - 2;

      if (shouldFollowLatest) {
        selectedIndex = snapshots.length - 1;
      } else {
        selectedIndex = Math.min(selectedIndex, snapshots.length - 1);
      }

      slider.value = String(selectedIndex);
      renderSelectedSnapshot();
    }

    async function pollSnapshots() {
      const after = snapshots.length - 1;
      const response = await fetch(`/api/elo-history?after=${after}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to fetch Elo history: ${response.status}`);
      }

      const payload = await response.json();
      if (payload.snapshots.length) {
        snapshots.push(...payload.snapshots);
      }

      syncSlider();
    }

    slider.addEventListener("input", () => {
      selectedIndex = Number(slider.value);
      followLatestCheckbox.checked = selectedIndex === snapshots.length - 1;
      renderSelectedSnapshot();
    });

    followLatestCheckbox.addEventListener("change", () => {
      if (followLatestCheckbox.checked && snapshots.length) {
        selectedIndex = snapshots.length - 1;
        slider.value = String(selectedIndex);
        renderSelectedSnapshot();
      }
    });

    async function loop() {
      try {
        await pollSnapshots();
      } catch (error) {
        document.getElementById("status-text").textContent = `Polling error: ${error.message}`;
      } finally {
        setTimeout(loop, pollIntervalMs);
      }
    }

    renderSelectedSnapshot();
    loop();
  </script>
</body>
</html>
